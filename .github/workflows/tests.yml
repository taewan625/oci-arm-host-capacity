  name: Tests

  on:
    push:
      branches:
        - main
    pull_request:
      branches:
        - main
    workflow_dispatch:
    schedule:
      - cron: '*/1 * * * *'

  jobs:
    tests:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v1

        - name: Install PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: '8.3'

        - name: Install dependencies
          run: composer update --prefer-dist --no-progress

        - name: Write private key
          run: |
            printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/private_key.pem
            chmod 600 /tmp/private_key.pem

        - name: Run instance creation
          id: oci
          run: |
            set +e
            OUTPUT=$(php index.php 2>&1)
            EXIT_CODE=$?
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -qi "ocid1.instance"; then
              echo "instance_created=true" >> $GITHUB_OUTPUT
            fi
            exit $EXIT_CODE
          env:
            OCI_REGION: ${{ secrets.OCI_REGION }}
            OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
            OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
            OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
            OCI_PRIVATE_KEY_FILENAME: /tmp/private_key.pem
            OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
            OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
            OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
            OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
            OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
            OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
            OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
            OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

        - name: Notify Telegram on instance creation
          if: steps.oci.outputs.instance_created == 'true'
          run: |
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
              -d "text=🎉 OCI ARM 인스턴스 생성 성공! 콘솔 확인하세요."

        - name: Notify Telegram on workflow failure
          if: failure()
          run: |
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
              -d "text=⚠️ Workflow 실패: ${{ github.workflow }} - 셋업 확인 필요"
